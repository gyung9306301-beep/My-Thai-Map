<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나만의 맛집 지도</title>
    <style>
        /* 지도의 크기와 상단 버튼 스타일 */
        #map { height: 600px; width: 100%; }
        .controls { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 10px; margin-right: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; }
        .category-btns button { background-color: #f8f9fa; }
        .lang-btns button { background-color: #28a745; color: white; border: none; }
        .lang-btns button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="category-btns">
            <strong>카테고리:</strong>
            <button onclick="filterMarkers('전체')">전체</button>
            <button onclick="filterMarkers('카페')">카페</button>
            <button onclick="filterMarkers('맛집')">맛집</button>
        </div>
        <div class="lang-btns">
            <strong>지도 언어:</strong>
            <button onclick="changeLanguage('ko')">한국어</button>
            <button onclick="changeLanguage('en')">English</button>
            <button onclick="changeLanguage('th')">ไทย</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map;
        let markers = [];
        let currentLanguage = 'ko'; 
        
        // 1. 구글 시트 주소
        const sheetUrl = "https://docs.google.com/spreadsheets/d/1fQWB61B46eUkrmvNh1SMNw5kzdjBgMgFKMNsDFLDz-4/export?format=csv";

        // 2. 여기에 발급받은 진짜 API 키를 입력하세요! (따옴표 필수)
        const YOUR_ACTUAL_API_KEY = "AIzaSyAkRmZ9inBvb42HZUOT6bP2Ly-nVgkYvOw";

        // 구글맵 링크에서 좌표(@위도,경도)만 추출하는 함수
        function extractCoords(link) {
            if (!link) return null;
            const match = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            return null;
        }

        // 지도를 처음 그리는 함수
        async function initMap() {
            const bangkok = { lat: 13.7210, lng: 100.5812 }; 
            map = new google.maps.Map(document.getElementById("map"), {
                center: bangkok,
                zoom: 14,
            });
            markers = []; 
            loadData(); // 시트 데이터 불러오기
        }

        // 구글 시트 데이터를 가져와 마커를 찍는 함수
        async function loadData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1); 

                rows.forEach(row => {
                    const cols = row.split(",").map(c => c.trim());
                    if (cols.length < 6) return; 

                    const place = {
                        name: cols[0],        // A: 상호
                        category: cols[1],    // B: 카테고리
                        subCategory: cols[2], // C: 세부카테고리
                        features: cols[3],    // D: 특징
                        grade: cols[4],       // E: 등급
                        link: cols[5]         // F: 구글맵 링크
                    };

                    const coords = extractCoords(place.link);

                    if (coords) {
                        // 일하기 좋은 곳은 초록색(11번), 나머지는 빨간색(7번) 아이콘
                        let iconUrl = "https://maps.google.com/mapfiles/ms/icons/red-dot.png";
                        if (place.subCategory && place.subCategory.includes("일하기")) {
                            iconUrl = "https://maps.google.com/mapfiles/ms/icons/green-dot.png";
                        }

                        const marker = new google.maps.Marker({
                            position: coords,
                            map: map,
                            title: place.name,
                            icon: iconUrl,
                            category: place.category
                        });

                        // 정보창 디자인 (픽토그램과 정보)
                        const contentString = `
                            <div style="padding:10px; min-width:200px; font-family: sans-serif;">
                                <h3 style="margin:0 0 5px 0; color:#28a745; font-size:16px;">${place.name}</h3>
                                <div style="font-size:13px; line-height:1.5;">
                                    <p style="margin:2px 0;"><b>분류:</b> ${place.category} (${place.subCategory})</p>
                                    <p style="margin:2px 0;"><b>특징:</b> ${place.features}</p>
                                    <p style="margin:2px 0;"><b>등급:</b> <span style="color:#f39c12; font-weight:bold;">${place.grade}</span></p>
                                </div>
                                <hr style="margin:8px 0; border:0; border-top:1px solid #eee;">
                                <a href="${place.link}" target="_blank" style="color:#007bff; text-decoration:none; font-weight:bold; font-size:13px;">📍 구글맵에서 보기 ↗</a>
                            </div>
                        `;

                        const infowindow = new google.maps.InfoWindow({ content: contentString });
                        marker.addListener("click", () => {
                            infowindow.open(map, marker);
                        });
                        markers.push(marker);
                    }
                });
            } catch (error) {
                console.error("데이터 로딩 에러:", error);
            }
        }

        // 버튼 누르면 필터링되는 기능
        function filterMarkers(category) {
            markers.forEach(marker => {
                if (category === '전체' || marker.category === category) {
                    marker.setMap(map);
                } else {
                    marker.setMap(null);
                }
            });
        }

        // 언어 변경을 위해 엔진 다시 불러오기
        function loadGoogleMapsScript(langCode) {
            const oldScript = document.getElementById("google-maps-script");
            if (oldScript) oldScript.parentNode.removeChild(oldScript);

            const script = document.createElement("script");
            script.id = "google-maps-script";
            script.async = true;
            script.defer = true;
            script.src = `https://maps.googleapis.com/maps/api/js?key=${YOUR_ACTUAL_API_KEY}&callback=initMap&language=${langCode}`;
            document.body.appendChild(script);
        }

        function changeLanguage(langCode) {
            if (currentLanguage === langCode) return;
            currentLanguage = langCode;
            loadGoogleMapsScript(langCode);
        }

        // 시작할 때 한국어 지도로 로드
        window.onload = function() {
            loadGoogleMapsScript(currentLanguage);
        };
    </script>
</body>
</html>
